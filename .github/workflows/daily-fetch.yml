name: Daily Price Fetch

on:
  schedule:
    # 19:30 UTC = 3:30 PM EST (winter) / 2:30 PM EDT (summer) — during market hours year-round
    - cron: '30 19 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://${{ secrets.VERCEL_DOMAIN }}/api/cron/fetch-prices)
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Cron endpoint returned non-200 status: $response"
            exit 1
          fi
